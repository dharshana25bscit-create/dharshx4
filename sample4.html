<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form {
            display: flex;
            gap: 10px;
        }

        input[type="search"] {
            width: 300px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<form action="https://formsubmit.io/send/your@email.com" method="POST">

    <!-- Honeypot spam protection -->
    <input name="_formsubmit_id" type="text" style="display:none">

    <input
        type="search"
        name="search_query"
        placeholder="Search..."
        required
    >

    <button type="submit">Search</button>
</form>

</body>
</html>
